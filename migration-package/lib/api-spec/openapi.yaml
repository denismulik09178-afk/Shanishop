openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MAISON NOIR Parfumerie API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: perfumes
    description: Perfume catalog
  - name: categories
    description: Perfume categories
  - name: orders
    description: Orders management
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /perfumes:
    get:
      operationId: listPerfumes
      tags: [perfumes]
      summary: List all perfumes
      parameters:
        - name: category_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: sort
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of perfumes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Perfume"
    post:
      operationId: createPerfume
      tags: [perfumes]
      summary: Create a new perfume (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerfumeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Perfume"

  /perfumes/{id}:
    get:
      operationId: getPerfume
      tags: [perfumes]
      summary: Get a perfume by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Perfume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Perfume"
        "404":
          description: Not found
    patch:
      operationId: updatePerfume
      tags: [perfumes]
      summary: Update a perfume (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerfumeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Perfume"
    delete:
      operationId: deletePerfume
      tags: [perfumes]
      summary: Delete a perfume (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated

  /stats:
    get:
      operationId: getStats
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Perfume:
      type: object
      required: [id, name, brand, price_per_ml, category_id, in_stock, created_at]
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: string
        price_per_ml:
          type: number
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
        category_id:
          type: ["integer", "null"]
        category_name:
          type: ["string", "null"]
        in_stock:
          type: boolean
        is_featured:
          type: boolean
        created_at:
          type: string

    PerfumeInput:
      type: object
      required: [name, brand, price_per_ml]
      properties:
        name:
          type: string
        brand:
          type: string
        price_per_ml:
          type: number
        description:
          type: string
        notes:
          type: string
        image_url:
          type: string
        category_id:
          type: ["integer", "null"]
        in_stock:
          type: boolean
        is_featured:
          type: boolean

    PerfumeUpdate:
      type: object
      properties:
        name:
          type: string
        brand:
          type: string
        price_per_ml:
          type: number
        description:
          type: string
        notes:
          type: string
        image_url:
          type: string
        category_id:
          type: ["integer", "null"]
        in_stock:
          type: boolean
        is_featured:
          type: boolean

    Category:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
        sort_order:
          type: integer

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        image_url:
          type: string
        sort_order:
          type: integer

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        image_url:
          type: string
        sort_order:
          type: integer

    OrderItem:
      type: object
      required: [perfume_id, perfume_name, brand, price_per_ml, ml, subtotal]
      properties:
        perfume_id:
          type: integer
        perfume_name:
          type: string
        brand:
          type: string
        price_per_ml:
          type: number
        ml:
          type: integer
        subtotal:
          type: number

    Order:
      type: object
      required: [id, customer_name, customer_phone, status, total, items, created_at]
      properties:
        id:
          type: integer
        customer_name:
          type: string
        customer_phone:
          type: string
        customer_address:
          type: ["string", "null"]
        customer_comment:
          type: ["string", "null"]
        status:
          type: string
        total:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        created_at:
          type: string

    OrderInput:
      type: object
      required: [customer_name, customer_phone, items]
      properties:
        customer_name:
          type: string
        customer_phone:
          type: string
        customer_address:
          type: string
        customer_comment:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItemInput:
      type: object
      required: [perfume_id, ml]
      properties:
        perfume_id:
          type: integer
        ml:
          type: integer

    OrderUpdate:
      type: object
      properties:
        status:
          type: string

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminSession:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        role:
          type: ["string", "null"]

    Stats:
      type: object
      required: [total_orders, pending_orders, total_perfumes, total_revenue, recent_orders]
      properties:
        total_orders:
          type: integer
        pending_orders:
          type: integer
        total_perfumes:
          type: integer
        total_revenue:
          type: number
        recent_orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"

    DeleteResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
